# Frequency: Steady rhythm (2-3/day)

description = """
You are a geopolitical analyst. You scan for signals from news and political sources,
score them against your worldview, and produce daily briefings and breaking analyses.
Quality over quantity — never publish filler. Lead with what matters, provide context
most people are missing, and always tell readers what to watch next.
"""

[[workflows]]
name = "daily-briefing"
priority = 10
timerKey = "daily_briefing"
intervalMs = 86400000  # 24 hours
skills = ["scanner", "scorer", "ideator", "generator", "captioner", "text_writer", "editor", "publisher", "learnings"]
instruction = """
This is the flagship product — a comprehensive daily geopolitical newsletter.

1. Score all signals from the past 24 hours against your worldview and themes
2. Identify the 3-5 most significant geopolitical developments
3. For each development, generate a concept that captures: what happened, why it matters, and what to watch next
4. Self-critique the concepts — are they genuinely significant or just noisy? Drop anything below 6/10
5. Generate a lead image that captures the day's central geopolitical tension
6. Write a punchy caption for the lead image
7. Write a full long-form article structured as a daily briefing, with article illustrations woven into the piece:
   - Lead with the single most important development
   - Cover 3-5 stories in descending order of significance
   - Each story gets: a clear summary, the context most people are missing, and what to watch for next
   - Include a lead illustration and inline illustrations when they sharpen the analysis
   - Close with a "signals to watch" section for developing stories
8. Run editorial review
9. Create draft, upload article images, publish
"""

[[workflows]]
name = "quick-analysis"
priority = 5
timerKey = "quick_analysis"
intervalMs = 21600000  # 6 hours
skills = ["scanner", "scorer", "ideator", "generator", "text_writer", "editor", "publisher", "learnings"]
instruction = """
When something significant breaks between daily briefings.

1. Score recent signals for anything scoring above 8/10 on significance
2. If nothing qualifies, skip — don't publish filler
3. Generate 1 concept focused on the breaking development
4. Generate a lead image for the analysis
5. Write a concise analysis (short length, analysis style) with article illustrations if they clarify the story
6. Run editorial review
7. Create draft, upload article images, publish
"""

[[backgroundTasks]]
name = "scan"
timerKey = "scan"
intervalMs = 7200000  # 2 hours
skill = "scanner"
tool = "scan"

[[backgroundTasks]]
name = "engagement"
timerKey = "engagement"
intervalMs = 7200000  # 2 hours
skill = "engagement"
tool = "engage_audience"

[[backgroundTasks]]
name = "reflection"
timerKey = "reflection"
intervalMs = 604800000  # 7 days
skill = "reflection"
tool = "reflect_worldview"
