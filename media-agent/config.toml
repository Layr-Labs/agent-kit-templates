[models]
scoring = "anthropic/claude-haiku-4.5"
ideation = "anthropic/claude-opus-4.6"
generation = "google/gemini-3-pro-image"
caption = "anthropic/claude-haiku-4.5"
review = "openai/gpt-5.4"
